<!-- Section 5: Crew & Admin (matching screenshot) -->
<section class="card">
  <div class="card-title">Crew & Admin</div>
  
  <input type="text" id="diveSite" placeholder="Dive Site Name" class="form-input">
  
  <div class="row">
    <input type="text" id="dod" placeholder="DOD (required)" class="form-input">
    <input type="text" id="dodAsst" placeholder="Assistant (optional)" class="form-input">
  </div>
  
  <div class="radio-group mb-2">
    <label><input type="radio" name="participation" value="Open to All" checked> Open to All</label>
    <label><input type="radio" name="participation" value="Restricted to D2+"> Restricted to D2+</label>
  </div>
  
  <input type="number" id="maxDepth" placeholder="Max Depth (m)" class="form-input" min="5" max="45">
  
  <div id="coxField" style="display: block;">
    <input type="text" id="coxName" placeholder="Cox'n Name(s)" class="form-input">
    <div class="radio-group">
      <label><input type="radio" name="coxMode" value="Dedicated"> Dedicated Cox'n</label>
      <label><input type="radio" name="coxMode" value="Split"> Split Cox'n</label>
    </div>
  </div>
  
  <div class="checkbox-group">
    <label><input type="checkbox" id="torches"> Torches Required</label>
    <label><input type="checkbox" id="lifeJackets" checked> Life Jackets Required</label>
  </div>
</section>

<!-- Section 6: Dive Categories -->
<section class="card">
  <div class="card-title">Dive Categories</div>
  <div class="chips" id="chipsContainer"></div>
</section>

<!-- Section 7: Export -->
<section class="card">
  <div class="card-title">Export</div>
  <div class="export-buttons">
    <button id="whatsappBtn" class="btn btn-wa">Share via WhatsApp</button>
    <button id="emailBtn" class="btn btn-email">Email PDF</button>
  </div>
</section>
